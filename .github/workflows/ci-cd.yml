name: Java CI/CD with Maven

# Kích hoạt khi có người đẩy code hoặc tạo Pull Request vào nhánh main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test-and-package:
    runs-on: ubuntu-latest # GitHub sẽ cấp một máy ảo Linux để chạy

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven 

    # PHẦN CI (TÍCH HỢP & KIỂM THỬ) 
    # Chạy lệnh test để kiểm tra logic (ví dụ file AuctionTest)
    - name: Build and Test with Maven
      run: mvn -B test --file pom.xml

    # PHẦN CD (PHÂN PHỐI/ĐÓNG GÓI) 
    - name: Build Package (JAR)
      run: mvn -B package --file pom.xml -DskipTests

    # Upload file Server
    - name: Upload Server JAR
      uses: actions/upload-artifact@v4
      with:
        name: Server-App
        path: target/*-server.jar

    # Upload file Client
    - name: Upload Client JAR
      uses: actions/upload-artifact@v4
      with:
        name: Client-App
        path: target/*-client.jar