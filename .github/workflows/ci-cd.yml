name: Java CI/CD with Maven

# Kích hoạt khi có người đẩy code hoặc tạo Pull Request vào nhánh main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test-and-package:
    runs-on: windows-latest
#    runs-on: ubuntu-latest # GitHub sẽ cấp một máy ảo Linux để chạy
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven

      # Tích hợp CI và CD vào một bước duy nhất
    - name: Build, Test and Package
      run: mvn -B -ntp package

      # Upload file Server
    - name: Upload Server JAR
      uses: actions/upload-artifact@v4
      with:
        name: Server-App
        path: target/*-server.jar

      # Upload file Client
    - name: Upload Client JAR
      uses: actions/upload-artifact@v4
      with:
        name: Client-App
        path: target/*-client.jar